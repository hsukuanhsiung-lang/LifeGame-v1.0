
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Life Game The Work</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f2;--bg4:#e5e5ea;
  --text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;
  --border:#e0e0e5;--border2:#c8c8d0;
  --accent:#ff9500;
  --c-life:#ff9500;--c-power:#ff2d55;--c-intel:#007aff;
  --c-agile:#34c759;--c-free:#ffcc00;--c-rest:#8e8e93;
  --gr:#34c759;--rd:#ff3b30;--bl:#007aff;
  --grd:#34c75918;--rdd:#ff3b3018;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;font-size:14px;display:flex;flex-direction:column;height:100vh}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
#g-header{padding:12px 16px 8px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border)}
#g-header-inner{display:flex;align-items:center;justify-content:space-between}
.g-title{font-size:20px;font-weight:800;color:var(--accent)}
.g-sub{font-size:11px;color:var(--text2);margin-top:1px}
.day-badge{border:1.5px solid var(--accent);color:var(--accent);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}

/* NAV */
#nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:6px 0 10px;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:var(--text3);font-size:10px;cursor:pointer;padding:2px 0;outline:none;-webkit-user-select:none;user-select:none}
.nav-btn .nav-ic{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent)}

/* APP */
#app{flex:1;overflow:hidden;position:relative;min-height:0}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column}
.page.active{display:flex}

/* SECTION */
.sect{font-size:11px;color:var(--text2);padding:10px 16px 5px;display:flex;align-items:center;justify-content:space-between;letter-spacing:.3px;text-transform:uppercase}
.sect-btn{font-size:13px;color:var(--accent);cursor:pointer;font-weight:600;text-transform:none;letter-spacing:0}

/* MODAL */
#m-bg{position:fixed;inset:0;background:#00000060;z-index:200;display:none;align-items:flex-end;justify-content:center}
#m-bg.open{display:flex}
#m-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 20px 36px;max-height:88vh;overflow-y:auto}
.m-title{font-size:17px;font-weight:700;margin-bottom:18px}
.m-row{margin-bottom:10px}
.m-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.m-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;-webkit-user-select:text;user-select:text;font-family:inherit}
.m-inp:focus{border-color:var(--accent)}
textarea.m-inp{resize:none;min-height:80px}
.m-btns{display:flex;gap:8px;margin-top:18px}
.m-btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;outline:none}
.m-btn-cancel{background:var(--bg3);color:var(--text2)}
.m-btn-ok{background:var(--accent);color:#fff}
.m-btn-del{background:var(--rdd);color:var(--rd);border:1px solid var(--rd)}

/* ==================== AI PAGE ==================== */
#pg-ai{padding-bottom:0}
.ai-msgs{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.ai-bubble{margin-bottom:12px;display:flex;flex-direction:column}
.ai-bubble.ai{align-items:flex-start}
.ai-bubble.user{align-items:flex-end}
.ai-text{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;max-width:88%;white-space:pre-wrap;word-break:break-all}
.ai-bubble.ai .ai-text{background:var(--bg2);border:1px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--text)}
.ai-bubble.user .ai-text{background:var(--accent);color:#fff;border-radius:16px 4px 16px 16px}
.ai-time{font-size:10px;color:var(--text3);margin-top:3px;padding:0 4px}
.ai-quick{display:flex;gap:6px;padding:6px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.ai-quick::-webkit-scrollbar{display:none}
.ai-qbtn{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text);white-space:nowrap;cursor:pointer;flex-shrink:0}
.ai-input-bar{display:flex;gap:8px;padding:8px 14px 8px;flex-shrink:0;border-top:1px solid var(--border);align-items:center}
.ai-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:22px;padding:9px 16px;color:var(--text);font-size:14px;outline:none;-webkit-user-select:text;user-select:text;font-family:inherit}
.ai-send{background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ==================== TIME TRACKER ==================== */
.tl-nav{display:flex;align-items:center;padding:6px 12px;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.tl-arrow{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:15px;color:var(--text);cursor:pointer;outline:none}
.tl-today-btn{background:transparent;border:1.5px solid var(--accent);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--accent);font-weight:700;cursor:pointer;outline:none}
.tl-nav-center{flex:1;text-align:center}
.tl-date-main{font-size:14px;font-weight:700}
.tl-date-sub{font-size:11px;color:var(--accent)}

/* Category pills */
.tl-cats{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tl-cats::-webkit-scrollbar{display:none}
.tl-cat{border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;outline:none;white-space:nowrap;-webkit-user-select:none;user-select:none}
.tl-cat-life{background:var(--c-life);color:#fff}
.tl-cat-power{background:var(--c-power);color:#fff}
.tl-cat-intel{background:var(--c-intel);color:#fff}
.tl-cat-agile{background:var(--c-agile);color:#fff}
.tl-cat-free{background:var(--c-free);color:#333}
.tl-cat-rest{background:var(--c-rest);color:#fff}
.tl-cat-clear{background:var(--bg4);color:var(--text2)}
.tl-cat.dim{opacity:0.4}

/* Sub items */
.tl-subs{display:flex;gap:6px;padding:2px 12px 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;align-items:center}
.tl-subs::-webkit-scrollbar{display:none}
.tl-sub{border:1.5px solid var(--border2);border-radius:14px;padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;background:none;outline:none;white-space:nowrap;-webkit-user-select:none;user-select:none}
.tl-sub.active{border-color:var(--accent);color:var(--accent);background:var(--bg3)}
.tl-add-sub{border:1.5px dashed var(--border2);border-radius:14px;padding:4px 12px;font-size:12px;color:var(--text3);cursor:pointer;background:none;outline:none}

/* Grid - 4 columns per hour */
.tl-grid-wrap{flex:1;overflow-y:auto;min-height:0}
.tl-grid{display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr;gap:1px;background:var(--border);margin:0 12px 8px;border-radius:8px;overflow:hidden}
.tl-time-cell{font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;height:26px;background:var(--bg2);font-family:monospace}
.tl-slot{height:26px;background:var(--bg3);cursor:pointer;transition:background .1s}
.tl-slot.filled{opacity:1}
.tl-slot.cat-life{background:var(--c-life)}
.tl-slot.cat-power{background:var(--c-power)}
.tl-slot.cat-intel{background:var(--c-intel)}
.tl-slot.cat-agile{background:var(--c-agile)}
.tl-slot.cat-free{background:var(--c-free)}
.tl-slot.cat-rest{background:var(--c-rest)}
.tl-early-row{background:var(--bg4)!important;color:var(--text2);font-size:11px;padding:0 10px;cursor:pointer;display:flex;align-items:center;height:26px;grid-column:1/-1}
/* Now marker */
.tl-slot.is-now{box-shadow:inset 0 0 0 2px var(--accent)}

/* Summary */
.tl-sum-wrap{flex-shrink:0;padding:6px 12px 8px;border-top:1px solid var(--border);background:var(--bg2);margin:0 12px;border-radius:0 0 8px 8px}
.tl-sum-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px}
.tl-sum-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tl-sum-name{color:var(--text);flex:1}
.tl-sum-val{color:var(--text2)}
.tl-sum-empty{font-size:11px;color:var(--text3);padding:2px 0}

/* ==================== DAILY CHALLENGE ==================== */
.daily-prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin:8px 12px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.daily-ring{position:relative;width:56px;height:56px;flex-shrink:0}
.daily-ring svg{transform:rotate(-90deg)}
.daily-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--accent)}
.daily-prog-info{flex:1}
.daily-prog-title{font-size:17px;font-weight:700;color:var(--accent)}
.daily-prog-sub{font-size:12px;color:var(--text2);margin-top:2px}

.daily-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 8px}
.dcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;position:relative;-webkit-user-select:none;user-select:none;transition:border-color .15s,opacity .2s,transform .2s}
.dcard.dragging{opacity:.4;transform:scale(.97)}
.dcard-del{position:absolute;bottom:10px;right:10px;width:22px;height:22px;border-radius:6px;background:#ff3b3022;border:1px solid #ff3b3066;color:#ff3b30;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;line-height:1}
.fcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:border-color .15s,opacity .2s}
.fcard-del{position:absolute;bottom:10px;right:10px;width:22px;height:22px;border-radius:6px;background:#ff3b3022;border:1px solid #ff3b3066;color:#ff3b30;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;line-height:1}
.dcard.done{background:var(--grd);border-color:var(--gr)}
.dcard.fail{background:var(--rdd);border-color:var(--rd)}
.dcard-ic{font-size:26px;margin-bottom:6px}
.dcard-name{font-size:14px;font-weight:700;color:var(--text)}
.dcard-rwd{font-size:11px;color:var(--text2);margin-top:2px}
.dcard-chk{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px}
.dcard.done .dcard-chk{background:var(--gr);border-color:var(--gr);color:#fff}
.dcard.fail .dcard-chk{background:var(--rd);border-color:var(--rd);color:#fff}
.dcard-strk{margin-top:6px}
.strk-badge{display:inline-flex;align-items:center;gap:3px;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700;border:1px solid}
.strk-win{background:#ff950018;color:var(--accent);border-color:var(--accent)}
.strk-lose{background:#007aff18;color:var(--bl);border-color:var(--bl)}

.fcard.violated{background:var(--rdd);border-color:var(--rd);position:relative}
.fcard{position:relative}
.fcard-ic{font-size:24px;margin-bottom:6px}
.fcard-name{font-size:14px;font-weight:700}
.fcard-days{font-size:11px;color:var(--text2);margin-top:4px}

/* ==================== TASK SYSTEM ==================== */
.task-tabs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.task-tabs::-webkit-scrollbar{display:none}
.task-tab{border:1.5px solid var(--border2);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;background:none;color:var(--text2);outline:none;white-space:nowrap;-webkit-user-select:none;user-select:none}
.task-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin:0 12px 8px;display:flex;gap:10px;align-items:flex-start}
.subtask-list{margin:6px 0 2px 30px;display:flex;flex-direction:column;gap:5px}
.subtask-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.subtask-chk{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px}
.subtask-chk.done{background:var(--gr);border-color:var(--gr);color:#fff}
.subtask-add{font-size:12px;color:var(--accent);cursor:pointer;margin:4px 0 2px 30px;display:inline-block}
.task-card.done-card{opacity:.5}
.task-chk{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:6px;flex-shrink:0;margin-top:1px;cursor:pointer;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;-webkit-user-select:none;user-select:none}
.task-chk.done{background:var(--gr);border-color:var(--gr);color:#fff}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600}
.task-sub{font-size:12px;color:var(--text2);margin-top:2px}
.task-tag{display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:2px 8px;font-size:11px;color:var(--text2);margin-top:4px}
.task-tag.main{color:var(--accent);border-color:var(--accent)}
.task-tag.side{color:var(--bl);border-color:var(--bl)}
.task-tag.delayed{color:#ff9f0a;border-color:#ff9f0a}
.task-del-btn{font-size:18px;color:var(--text3);cursor:pointer;padding:0 2px;line-height:1;-webkit-user-select:none;user-select:none}

/* ==================== ATTRIBUTES ==================== */
/* RPG Character Panel */
.attr-page-wrap{padding:8px 12px 20px}

/* Character Card */
.char-panel{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:20px;padding:20px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.char-panel::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#ffffff08 0%,transparent 60%);pointer-events:none}
.char-panel-top{display:flex;align-items:flex-start;gap:14px}

/* Character figure — CSS drawn */
.char-figure{flex-shrink:0;position:relative;width:90px;height:110px}
.char-body-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
/* Glow ring under feet */
.char-glow{width:60px;height:12px;background:radial-gradient(ellipse,var(--glow-c,#ff9500) 0%,transparent 70%);position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);opacity:.6}
/* Cape */
.char-cape{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:44px;height:52px;background:var(--cape-c,#4a4a8a);border-radius:4px 4px 14px 14px;z-index:1}
.char-cape::after{content:'';position:absolute;bottom:0;left:4px;right:4px;height:20px;background:var(--cape-dark,#2a2a5a);border-radius:0 0 10px 10px}
/* Body/armor */
.char-torso{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:36px;height:38px;background:var(--armor-c,#5a5a8a);border-radius:8px 8px 4px 4px;z-index:2;display:flex;align-items:center;justify-content:center}
.char-torso::before{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:16px;height:10px;background:var(--armor-gem,#aaaacc);border-radius:3px;opacity:.7}
/* Arms */
.char-arm-l,.char-arm-r{position:absolute;bottom:38px;width:12px;height:30px;background:var(--armor-c,#5a5a8a);border-radius:6px;z-index:2}
.char-arm-l{left:calc(50% - 26px);transform:rotate(10deg);transform-origin:top center}
.char-arm-r{left:calc(50% + 14px);transform:rotate(-10deg);transform-origin:top center}
/* Weapon */
.char-weapon{position:absolute;bottom:28px;left:calc(50% + 20px);width:6px;height:44px;background:linear-gradient(180deg,#ffd700,#ff8c00);border-radius:3px;z-index:3;box-shadow:0 0 8px #ffd70066}
.char-weapon::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:14px;height:14px;background:radial-gradient(circle,#fff,#ffd700);border-radius:50%;box-shadow:0 0 10px #ffd700}
/* Shield */
.char-shield{position:absolute;bottom:32px;left:calc(50% - 36px);width:18px;height:22px;background:linear-gradient(135deg,#4a9eff,#0055cc);border-radius:4px 4px 6px 6px;z-index:3;border:2px solid #88ccff;box-shadow:0 0 8px #4a9eff44}
.char-shield::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:10px}
/* Legs */
.char-legs-wrap{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.char-leg{width:14px;height:24px;background:var(--leg-c,#3a3a6a);border-radius:4px 4px 6px 6px}
/* Boots */
.char-leg::after{content:'';display:block;width:16px;height:8px;background:var(--boot-c,#2a1a0a);border-radius:2px 2px 4px 4px;margin-top:16px;margin-left:-1px}
/* Head */
.char-head-wrap{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center}
.char-face{width:32px;height:32px;background:var(--skin-c,#ffc896);border-radius:50%;border:2px solid #c8955a;display:flex;align-items:center;justify-content:center;font-size:14px}
/* Helmet */
.char-helmet{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:34px;height:20px;background:var(--armor-c,#5a5a8a);border-radius:8px 8px 0 0;border:1px solid var(--armor-gem,#aaaacc)}
.char-helmet::after{content:'';position:absolute;top:2px;left:50%;transform:translateX(-50%);width:4px;height:10px;background:var(--cape-c,#cc3333);border-radius:2px}
/* Level badge */
.char-lvl-badge{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,#ffd700,#ff8c00);border-radius:12px;padding:4px 10px;font-size:12px;font-weight:800;color:#1a0a00;box-shadow:0 2px 8px #ffd70066}
/* Player info */
.char-info{flex:1}
.char-name{font-size:20px;font-weight:800;color:#fff;margin-bottom:2px}
.char-title-badge{display:inline-block;background:#ffffff18;border:1px solid #ffffff30;border-radius:10px;padding:3px 10px;font-size:11px;color:#ffcc88;margin-bottom:10px}
.char-day{font-size:11px;color:#ffffff60;margin-bottom:12px}
/* EXP bar */
.char-exp-label{font-size:10px;color:#ffffff60;margin-bottom:4px}
.char-exp-bar{height:8px;background:#ffffff18;border-radius:4px;overflow:hidden;margin-bottom:12px}
.char-exp-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ff8c00);border-radius:4px;transition:width .5s}
/* Mini stat pills */
.char-stats-row{display:flex;flex-wrap:wrap;gap:4px}
.char-stat-pill{background:#ffffff12;border:1px solid #ffffff20;border-radius:8px;padding:3px 8px;font-size:10px;color:#ffffffcc;display:flex;align-items:center;gap:3px}

/* Equipment slots row */
.equip-row{display:flex;gap:6px;margin-top:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.equip-row::-webkit-scrollbar{display:none}
.equip-slot{flex-shrink:0;width:52px;display:flex;flex-direction:column;align-items:center;gap:4px}
.equip-box{width:48px;height:48px;background:#ffffff0e;border:1.5px solid #ffffff22;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;transition:all .2s}
.equip-box.unlocked{border-color:var(--equip-c,#ffd700);background:var(--equip-bg,#ffd70015);box-shadow:0 0 10px var(--equip-glow,#ffd70040)}
.equip-box.locked{filter:grayscale(.8);opacity:.4}
.equip-box .equip-lv{position:absolute;bottom:2px;right:4px;font-size:8px;font-weight:800;color:var(--equip-c,#ffd700)}
.equip-label{font-size:9px;color:#ffffff60;text-align:center}

/* Attribute cards */
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:0}
.attr-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px}
.attr-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.attr-icon{font-size:20px}
.attr-name{font-size:12px;color:var(--text2);font-weight:600}
.attr-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:6px}
.attr-bar-bg{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.attr-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.attr-today{font-size:10px;color:var(--text3);margin-top:4px}

/* ==================== MEMORY CENTER ==================== */
.mem-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin:0 12px 8px}
.mem-card-date{font-size:11px;color:var(--text3);margin-bottom:5px}
.mem-card-text{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-all}
.mem-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.mem-tag{background:var(--bg3);border-radius:8px;padding:2px 8px;font-size:11px;color:var(--text2)}
.mem-empty{text-align:center;color:var(--text3);padding:60px 20px;font-size:13px;line-height:2.2}
</style>
</head>
<body>

<!-- HEADER -->
<div id="g-header">
  <div id="g-header-inner">
    <div>
      <div class="g-title">Life Game The Work</div>
      <div class="g-sub" id="g-date"></div>
    </div>

</div>

<!-- APP -->
<div id="app">

  <!-- AI PAGE -->
  <div class="page active" id="pg-ai">
    <div class="ai-msgs" id="ai-msgs"></div>
    <div class="ai-quick">
      <div class="ai-qbtn" onclick="aiQ('今日总结')">📊 今日总结</div>
      <div class="ai-qbtn" onclick="aiQ('查看属性')">✨ 查看属性</div>
      <div class="ai-qbtn" onclick="aiQ('健身了1小时')">💪 健身1h</div>
      <div class="ai-qbtn" onclick="aiQ('读书了30分钟')">📚 读书30min</div>

  <!-- DAILY CHALLENGE PAGE -->

      <button class="task-tab" id="tt-main" onclick="setTaskTab('main',this)">主线任务</button>
      <button class="task-tab" id="tt-side" onclick="setTaskTab('side',this)">支线任务</button>
      <button class="task-tab" id="tt-delayed" onclick="setTaskTab('delayed',this)">顺延任务</button>
    </div>
    <div class="sect">
      <span id="task-list-title">今日任务</span>
      <span class="sect-btn" onclick="openM('addTask')">+ 新增</span>
    </div>
    <div id="task-list"></div>
  </div>

  <!-- ATTRIBUTES PAGE -->
  <div class="page" id="pg-attr">
    <div class="attr-page-wrap">
      <div id="attr-hero-wrap"></div>
      <div class="attr-grid" id="attr-grid"></div>
    </div>

  <!-- MEMORY PAGE -->
  <div class="page" id="pg-mem">
    <div class="sect">
      <span>记忆中心</span>
      <span class="sect-btn" onclick="openM('addMem')">+ 记录</span>

</div><!-- end app -->

<!-- BOTTOM NAV -->
<div id="nav">

    <span class="nav-ic">🤖</span><span>AI</span>
  </button>

  </button>

  </button>

  </button>

<!-- MODAL -->
<div id="m-bg" onclick="if(event.target===this)closeM()">
  <div id="m-box"></div>
</div>

<script>
'use strict';
// ============================================================
// DATA
// ============================================================
var CATS=[
  {k:'life', l:'生命', c:'#ff9500', cls:'cat-life', attr:{life:1.0}},
  {k:'power',l:'力量', c:'#ff2d55', cls:'cat-power',attr:{power:1.0}},
  {k:'intel',l:'智力', c:'#007aff', cls:'cat-intel',attr:{intel:1.0}},
  {k:'agile',l:'敏捷', c:'#34c759', cls:'cat-agile',attr:{agile:1.0}},
  {k:'free', l:'自由', c:'#ffcc00', cls:'cat-free', attr:{free:1.0}},
  {k:'rest', l:'休息', c:'#8e8e93', cls:'cat-rest', attr:{}},
];

var ATTRS=[
  {k:'life', l:'生命值', c:'#ff9500', ic:'❤️'},
  {k:'power',l:'力量',   c:'#ff2d55', ic:'💪'},
  {k:'intel',l:'智力',   c:'#007aff', ic:'🧠'},
  {k:'agile',l:'敏捷',   c:'#34c759', ic:'⚡'},
  {k:'free', l:'自由点', c:'#ffcc00', ic:'⭐'},
];

var DEF_SUBS={
  life: [{k:'wash',l:'洗漱'},{k:'meal',l:'饮食'},{k:'health',l:'健康'}],
  power:[{k:'gym',l:'健身'},{k:'run',l:'跑步'},{k:'yoga',l:'瑜伽'}],
  intel:[{k:'write',l:'写作'},{k:'read',l:'阅读'},{k:'course',l:'课程'}],
  agile:[{k:'sport',l:'运动'},{k:'stretch',l:'拉伸'}],
  free: [{k:'work',l:'工作'},{k:'create',l:'创作'},{k:'plan',l:'规划'}],
  rest: [{k:'sleep',l:'睡眠'},{k:'relax',l:'放松'},{k:'med',l:'冥想'}],
};

function mkDef(){
  var today=tod();
  return{
    v:'1.2',
    startDate:today,
    playerName:'玩家',
    aiMsgs:[{r:'ai',t:'欢迎来到人生游戏！🎮\n\n我是你的向导。直接告诉我你做了什么，比如「健身了1小时」「读书30分钟」，我会帮你记录并计算属性。\n\n你叫什么名字？',ts:fmtT(new Date())}],
    tl:{},
    tlDate:today,
    tlCat:'free',
    tlSub:'work',
    tlShowEarly:false,
    catSubs:JSON.parse(JSON.stringify(DEF_SUBS)),
    daily:[
      {id:'d1',ic:'⏰',n:'6点起床',  rwd:'',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d2',ic:'🧘',n:'冥想',     rwd:'早+晚',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d3',ic:'💪',n:'健身',     rwd:'≥1.5小时',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d4',ic:'🤸',n:'瑜伽',    rwd:'≥0.5小时',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d5',ic:'📚',n:'读书',     rwd:'≥0.5小时',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d6',ic:'🎬',n:'日更视频', rwd:'',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d7',ic:'💰',n:'记账',     rwd:'',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'d8',ic:'🚿',n:'冷水澡',   rwd:'',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
    ],
    forbid:[
      {id:'f1',ic:'🚬',n:'戒烟',  st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'f2',ic:'🍬',n:'戒糖',  st:'p',lastCheck:'',winStreak:0,loseStreak:0},
      {id:'f3',ic:'🎮',n:'戒游戏',st:'p',lastCheck:'',winStreak:0,loseStreak:0},
    ],
    tasks:[
      {id:'t1',n:'完成Life Game基础版',sub:'',type:'main',period:'today',done:false,delayed:false,date:today,subtasks:[]},
    ],
    mems:[],
    taskTab:'all',
  };
}

var S=null;
// Try all previous keys for migration
var _KEYS=['lifegame','lgbase','lg11','lg12'];
for(var _ki=_KEYS.length-1;_ki>=0&&!S;_ki--){
  try{var _d=localStorage.getItem(_KEYS[_ki]);if(_d)S=JSON.parse(_d);}catch(e){}
}
// Migrate or init
if(!S){S=mkDef();}
else{
  // Patch missing fields from newer versions
  if(!S.v)S.v='legacy';
  S.daily=(S.daily||[]).map(function(t){
    if(!t.hasOwnProperty('winStreak'))t.winStreak=0;
    if(!t.hasOwnProperty('loseStreak'))t.loseStreak=0;
    return t;
  });
  S.tasks=(S.tasks||[]).map(function(t){
    if(!t.subtasks)t.subtasks=[];
    return t;
  });
  if(!S.forbid)S.forbid=[];
  if(!S.mems)S.mems=[];
  if(!S.catSubs)S.catSubs=JSON.parse(JSON.stringify(DEF_SUBS));
  if(!S.taskTab)S.taskTab='all';
  if(!S.tlDate)S.tlDate=tod();
  if(!S.tlCat)S.tlCat='free';
  if(!S.tlSub)S.tlSub='work';
  S.v='1.2';
}
function sv(){try{
  localStorage.setItem('lifegame',JSON.stringify(S));
  // Clean up old keys
  _KEYS.slice(0,-1).forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
}catch(e){}}

// ============================================================
// UTILS
// ============================================================
function tod(){
  var d=new Date();
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
}
function p2(n){return String(n).padStart(2,'0');}
function fmtT(d){return p2(d.getHours())+':'+p2(d.getMinutes());}
function fmtDate(ds){
  var d=new Date(ds+'T12:00:00');
  var w=['日','一','二','三','四','五','六'];
  return{main:(d.getMonth()+1)+'/'+(d.getDate())+' 星期'+w[d.getDay()],sub:ds===tod()?'今天':''};
}
function addDays(ds,n){
  var d=new Date(ds+'T12:00:00');
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
}
function fmtNum(n){
  if(n===0)return '0';
  var s=n.toFixed(2);
  // remove trailing zeros after decimal
  s=s.replace(/\.?0+$/,'');
  return s;
}
function daysSince(ds){
  return Math.floor((new Date()-new Date(ds+'T12:00:00'))/86400000);
}

// Compute total attributes from all time records
function compTotalAttr(){
  var r={life:0,power:0,intel:0,agile:0,free:0};
  Object.values(S.tl).forEach(function(day){
    Object.values(day).forEach(function(e){
      var cat=CATS.find(function(c){return c.k===e.cat;});
      if(cat){Object.keys(cat.attr).forEach(function(k){r[k]=(r[k]||0)+cat.attr[k]*0.25;});}
    });
  });
  return r;
}

// Compute attributes for one date
function compDayAttr(ds){
  var r={life:0,power:0,intel:0,agile:0,free:0};
  var day=S.tl[ds]||{};
  Object.values(day).forEach(function(e){
    var cat=CATS.find(function(c){return c.k===e.cat;});
    if(cat){Object.keys(cat.attr).forEach(function(k){r[k]=(r[k]||0)+cat.attr[k]*0.25;});}
  });
  return r;
}

// ============================================================
// NAV
// ============================================================
function nav(page,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('pg-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='tl'){renderTL();}
  else if(page==='daily'){renderDaily();}
  else if(page==='task'){renderTask();}
  else if(page==='attr'){renderAttr();}
  else if(page==='mem'){renderMem();}
}

// ============================================================
// HEADER
// ============================================================
function renderHeader(){
  var d=new Date();
  var w=['日','一','二','三','四','五','六'];
  document.getElementById('g-date').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+w[d.getDay()];
  document.getElementById('g-day').textContent='Day '+(daysSince(S.startDate)+1);
}

// ============================================================
// AI PAGE
// ============================================================
var ACT_MAP=[
  {pat:'健身|撸铁|力量训练|gym',cat:'power',sub:'gym',l:'健身'},
  {pat:'跑步|跑|有氧|慢跑',    cat:'power',sub:'run',l:'跑步'},
  {pat:'瑜伽|拉伸|yoga',       cat:'power',sub:'yoga',l:'瑜伽'},
  {pat:'游泳|swim',            cat:'power',sub:'gym',l:'游泳'},
  {pat:'写作|写文|码字',        cat:'intel',sub:'write',l:'写作'},
  {pat:'读书|阅读|看书',        cat:'intel',sub:'read',l:'读书'},
  {pat:'学习|课程|study',       cat:'intel',sub:'course',l:'学习'},
  {pat:'冥想|打坐|meditation',  cat:'rest', sub:'med',l:'冥想'},
  {pat:'睡觉|睡眠|sleep',       cat:'rest', sub:'sleep',l:'睡眠'},
  {pat:'工作|搬砖|coding|编程', cat:'free', sub:'work',l:'工作'},
  {pat:'创作|剪辑|视频',        cat:'free', sub:'create',l:'创作'},
  {pat:'运动|锻炼|exercise',    cat:'power',sub:'gym',l:'运动'},
  {pat:'洗澡|洗漱|吃饭',        cat:'life', sub:'wash',l:'生活'},
];

function parseDur(text){
  var m;
  m=text.match(/(\d+\.?\d*)\s*(?:小时|h)/i);if(m)return parseFloat(m[1]);
  m=text.match(/(\d+\.?\d*)\s*(?:分钟|min|分)/i);if(m)return parseFloat(m[1])/60;
  return null;
}

function writeSlots(cat,sub,hours){
  var slots=Math.round(hours*4);if(slots<=0)return 0;
  var end=new Date();
  var ds=tod();
  if(!S.tl[ds])S.tl[ds]={};
  var g=S.tl[ds],written=0;
  for(var i=0;i<slots;i++){
    var t=new Date(end.getTime()-i*15*60000);
    var hh=t.getHours(),qq=Math.floor(t.getMinutes()/15);
    var sl=p2(hh)+':'+['00','15','30','45'][qq];
    if(!g[sl]){g[sl]={cat:cat,sub:sub};written++;}
  }
  sv();return written;
}

function genResp(text){
  var t=text.trim();
  // Name
  if(/叫|名字|我是/.test(t)){
    var m=t.match(/(?:叫|是|：|:)\s*([^\s，。！？\d]{1,8})/);
    if(m&&m[1].length>=1){
      S.playerName=m[1];sv();renderAttr();
      return '🎮 欢迎入场，'+m[1]+'！\n\n从现在起，你的每一个行动都会转化为属性点。\n\n直接告诉我你做了什么，比如「健身了1小时」，我来帮你记录！';
    }
  }
  // Act + duration
  var act=null;
  for(var i=0;i<ACT_MAP.length;i++){
    if(new RegExp(ACT_MAP[i].pat).test(t)){act=ACT_MAP[i];break;}
  }
  var dur=parseDur(t);
  if(act&&dur){
    var written=writeSlots(act.cat,act.sub,dur);
    var catObj=CATS.find(function(c){return c.k===act.cat;});
    var dayAttr=compDayAttr(tod());
    var hStr=dur>=1?(Math.round(dur*10)/10)+'小时':Math.round(dur*60)+'分钟';
    var attrLine='';
    var attrGained=[];
    ATTRS.forEach(function(a){
      if(dayAttr[a.k]>0){
        attrLine+=a.l+' +'+fmtNum(dayAttr[a.k])+' ';
        attrGained.push(a.ic+a.l+'+'+fmtNum(catObj&&catObj.attr[a.k]?(catObj.attr[a.k]*dur):0));
      }
    });
    // Auto-write to memory
    if(!S.mems)S.mems=[];
    S.mems.push({
      id:'m'+Date.now(),date:tod(),ts:fmtT(new Date()),
      text:act.l+' '+hStr,
      tags:[(catObj?catObj.l:'活动'),hStr],
      attrGained:attrGained
    });
    sv();
    return '✅ 已记录！\n\n'+act.l+' · '+hStr+' · 写入'+written+'个格子\n\n今日属性：\n'+attrLine;
  }
  if(act&&!dur){
    return '⏱ 你'+act.l+'了多长时间？\n\n比如「'+act.l+'了1小时」或「'+act.l+'了30分钟」';
  }
  // Summary
  if(/总结|今天/.test(t)){
    var g=S.tl[tod()]||{};
    var tot=Object.keys(g).length*0.25;
    var da=compDayAttr(tod());
    var al='';ATTRS.forEach(function(a){if(da[a.k]>0)al+=a.l+'+'+da[a.k].toFixed(1)+' ';});
    return '📊 今日战报\n\n⏱ '+tot.toFixed(1)+'小时\n✨ '+(al||'暂无属性');
  }
  // Attr
  if(/属性|升了/.test(t)){
    var total=compTotalAttr();
    var da2=compDayAttr(tod());
    var lines=[];
    ATTRS.forEach(function(a){lines.push(a.l+'：今日+'+da2[a.k].toFixed(2)+'  累计'+total[a.k].toFixed(1));});
    return '✨ 属性面板\n\n'+lines.join('\n');
  }
  var rs=['直接告诉我你干了啥！比如「健身了45分钟」💪','每一分钟都算数，说出来让我记下来！','今日还未记录，赶紧开始吧⚡'];
  return rs[Math.floor(Math.random()*rs.length)];
}

function renderAI(){
  var msgs=document.getElementById('ai-msgs');
  msgs.innerHTML=S.aiMsgs.map(function(m){
    return '<div class="ai-bubble '+m.r+'"><div class="ai-text">'+m.t.replace(/</g,'&lt;')+'</div><div class="ai-time">'+m.ts+'</div></div>';
  }).join('');
  msgs.scrollTop=msgs.scrollHeight;
}

function sendAI(){
  var inp=document.getElementById('ai-inp');
  var txt=inp.value.trim();if(!txt)return;
  inp.value='';
  S.aiMsgs.push({r:'user',t:txt,ts:fmtT(new Date())});
  sv();renderAI();
  setTimeout(function(){
    var resp=genResp(txt);
    S.aiMsgs.push({r:'ai',t:resp,ts:fmtT(new Date())});
    sv();renderAI();
  },400);
}
function aiQ(t){document.getElementById('ai-inp').value=t;sendAI();}

// ============================================================
// TIME TRACKER
// ============================================================
var tlShowEarly=false;

function renderTL(){
  // Date nav
  var fd=fmtDate(S.tlDate);
  document.getElementById('tl-date-main').textContent=fd.main;
  document.getElementById('tl-date-sub').textContent=fd.sub;
  renderTLCats();renderTLSubs();renderTLGrid();renderTLSum();
}

function tlMove(n){S.tlDate=addDays(S.tlDate,n);sv();renderTL();}
function tlGoToday(){S.tlDate=tod();sv();renderTL();}

function renderTLCats(){
  var html=CATS.map(function(c){
    var dim=S.tlCat!==c.k&&S.tlCat!=='__clear'?' dim':'';
    return '<button class="tl-cat tl-cat-'+c.k+dim+'" onclick="selCat(\''+c.k+'\')">'+c.l+'</button>';
  }).join('');
  html+='<button class="tl-cat tl-cat-clear'+(S.tlCat==='__clear'?'':' dim')+'" onclick="selCat(\'__clear\')">清除</button>';
  document.getElementById('tl-cats').innerHTML=html;
}

function selCat(k){
  if(k==='__clear'){S.tlCat='__clear';S.tlSub='';}
  else{
    S.tlCat=k;
    var subs=S.catSubs[k]||[];
    S.tlSub=subs.length?subs[0].k:'';
  }
  sv();renderTLCats();renderTLSubs();
}

function renderTLSubs(){

  var subs=S.catSubs[S.tlCat]||[];

  html+='<button class="tl-add-sub" id="tl-add-sub-btn">+ 添加小项</button>';

    if(!name||!name.trim())return;
    var nk='s'+Date.now();

function selSub(k){S.tlSub=k;sv();renderTLSubs();}

function renderTLGrid(){
  var g=S.tl[S.tlDate]||{};
  var now=S.tlDate===tod()?new Date():null;
  var nowH=now?now.getHours():-1;
  var nowQ=now?Math.floor(now.getMinutes()/15):-1;
  var QS=['00','15','30','45'];

  // Count early slots
  var earlyCount=0;
  for(var h=0;h<6;h++)for(var q=0;q<4;q++){if(g[p2(h)+':'+QS[q]])earlyCount++;}

  var html='';
  // Early hours row
  var earlyLbl=tlShowEarly?'∧ 收起凌晨时段':'› 00:00–06:00（'+(earlyCount?earlyCount+'个记录':'点击展开')+'）';
  html+='<div class="tl-early-row" onclick="tlToggleEarly()">'+earlyLbl+'</div>';

  if(tlShowEarly){
    for(var h=0;h<6;h++){
      html+='<div class="tl-time-cell">'+p2(h)+':00</div>';
      for(var q=0;q<4;q++){
        var sl=p2(h)+':'+QS[q];
        var e=g[sl];var cat=e?CATS.find(function(c){return c.k===e.cat;}):null;
        var isNow=(now&&h===nowH&&q===nowQ);
        html+='<div class="tl-slot'+(e?' filled '+cat.cls:'')+(isNow?' is-now':'')+'" onclick="togSlot(\''+sl+'\')"></div>';
      }
    }
  }
  // 06:00–23:00
  for(var h=6;h<24;h++){
    html+='<div class="tl-time-cell">'+p2(h)+':00</div>';
    for(var q=0;q<4;q++){
      var sl=p2(h)+':'+QS[q];
      var e=g[sl];var cat=e?CATS.find(function(c){return c.k===e.cat;}):null;
      var isNow=(now&&h===nowH&&q===nowQ);
      html+='<div class="tl-slot'+(e?' filled '+cat.cls:'')+(isNow?' is-now':'')+'" onclick="togSlot(\''+sl+'\')"></div>';
    }
  }
  document.getElementById('tl-grid').innerHTML=html;

  // Scroll to current hour
  if(now&&!tlShowEarly){
    var rowH=27;
    document.getElementById('tl-grid').parentElement.scrollTop=Math.max(0,(nowH-7))*rowH;
  }
}

function tlToggleEarly(){tlShowEarly=!tlShowEarly;renderTLGrid();}

function togSlot(slot){
  if(!S.tl[S.tlDate])S.tl[S.tlDate]={};
  var g=S.tl[S.tlDate];
  var wasEmpty=!g[slot];
  if(S.tlCat==='__clear'){delete g[slot];}
  else if(g[slot]&&g[slot].cat===S.tlCat&&g[slot].sub===S.tlSub){delete g[slot];}
  else{g[slot]={cat:S.tlCat,sub:S.tlSub};}
  sv();renderTLGrid();renderTLSum();
  // Auto-write memory summary once per minute of recording
  if(wasEmpty&&S.tlCat&&S.tlCat!=='__clear'){
    var catObj=CATS.find(function(c){return c.k===S.tlCat;});
    var subObj=(S.catSubs[S.tlCat]||[]).find(function(s){return s.k===S.tlSub;});
    var label=(subObj?subObj.l:(catObj?catObj.l:'活动'));
    // Count total slots for this cat/sub today
    var count=Object.values(g).filter(function(e){return e.cat===S.tlCat&&e.sub===S.tlSub;}).length;
    var hrs=(count*0.25).toFixed(2).replace(/\.?0+$/,'');
    // Update or create memory entry for this activity today
    var memKey=S.tlDate+'|'+S.tlCat+'|'+S.tlSub;
    if(!S.mems)S.mems=[];
    var existing=S.mems.find(function(m){return m.memKey===memKey;});
    var attrGained=[];
    if(catObj&&catObj.attr){
      ATTRS.forEach(function(a){
        if(catObj.attr[a.k]){
          attrGained.push(a.ic+a.l+'+'+fmtNum(catObj.attr[a.k]*count*0.25));
        }
      });
    }
    if(existing){
      existing.text=label+' '+hrs+'小时';
      existing.attrGained=attrGained;
      existing.ts=fmtT(new Date());
    }else{
      S.mems.push({
        id:'m'+Date.now(),memKey:memKey,date:S.tlDate,
        ts:fmtT(new Date()),text:label+' '+hrs+'小时',
        tags:[catObj?catObj.l:'活动',hrs+'小时'],
        attrGained:attrGained
      });
    }
    sv();
  }
}

function renderTLSum(){
  var g=S.tl[S.tlDate]||{};
  var groups={};
  Object.values(g).forEach(function(e){
    var k=e.cat+'|'+e.sub;groups[k]=(groups[k]||0)+1;
  });
  var keys=Object.keys(groups);
  if(!keys.length){
    document.getElementById('tl-sum-wrap').innerHTML='<div class="tl-sum-empty">点击格子记录时间</div>';return;
  }
  var html='';
  keys.forEach(function(k){
    var parts=k.split('|');
    var cat=CATS.find(function(c){return c.k===parts[0];});
    if(!cat)return;
    var sub=(S.catSubs[parts[0]]||[]).find(function(s){return s.k===parts[1];});
    html+='<div class="tl-sum-row"><div class="tl-sum-dot" style="background:'+cat.c+'"></div>'
      +'<span class="tl-sum-name">'+cat.l+(sub?' · '+sub.l:'')+'</span>'
      +'<span class="tl-sum-val">'+(groups[k]*0.25).toFixed(2)+'h</span></div>';
  });
  document.getElementById('tl-sum-wrap').innerHTML=html;
}

function midnightCheck(){
  var today=tod();
  var all=S.daily.concat(S.forbid||[]);
  all.forEach(function(t){
    if(t.lastCheck&&t.lastCheck!==today&&t.st==='p'){
      t.st='f';t.loseStreak=(t.loseStreak||0)+1;t.winStreak=0;
    }
  });
  sv();
}

function cycleTask(id,isForbid){
  var list=isForbid?(S.forbid||[]):S.daily;
  var t=list.find(function(x){return x.id===id;});
  if(!t)return;
  var today=tod();
  if(t.lastCheck===today){
    var cycle=['p','d','f'];
    t.st=cycle[(cycle.indexOf(t.st)+1)%3];
  }else{
    if(t.st==='p')t.st='d';
    else if(t.st==='d')t.st='f';
    else t.st='p';
    t.lastCheck=today;
    if(t.st==='d'){t.winStreak=(t.winStreak||0)+1;t.loseStreak=0;}
    else if(t.st==='f'){t.loseStreak=(t.loseStreak||0)+1;t.winStreak=0;}
  }
  sv();renderDaily();
}

function renderDaily(){
  midnightCheck();
  var done=S.daily.filter(function(t){return t.st==='d';}).length;
  var total=S.daily.length;
  var pct=total?Math.round(done/total*100):0;
  var r=24,circ=2*Math.PI*r;
  document.getElementById('daily-prog').innerHTML=
    '<div class="daily-prog-card">'
    +'<div class="daily-ring"><svg width="56" height="56" viewBox="0 0 56 56">'
    +'<circle cx="28" cy="28" r="'+r+'" fill="none" stroke="#e5e5ea" stroke-width="4"/>'
    +'<circle cx="28" cy="28" r="'+r+'" fill="none" stroke="#ff9500" stroke-width="4"'
    +' stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ*(1-pct/100))+'" stroke-linecap="round"/>'
    +'</svg><div class="daily-ring-pct">'+pct+'%</div></div>'
    +'<div class="daily-prog-info"><div class="daily-prog-title">'+pct+'%</div>'
    +'<div class="daily-prog-sub">'+done+'/'+total+' 今日挑战完成</div></div></div>';

  document.getElementById('daily-grid').innerHTML=S.daily.map(function(t){
    var chk=t.st==='d'?'✓':t.st==='f'?'✗':'';
    var strk='';
    if(t.winStreak>0)strk='<div class="dcard-strk"><span class="strk-badge strk-win">🔥'+t.winStreak+'天</span></div>';
    else if(t.loseStreak>0)strk='<div class="dcard-strk"><span class="strk-badge strk-lose">🧊'+t.loseStreak+'天</span></div>';
    return '<div class="dcard '+(t.st==='d'?'done':t.st==='f'?'fail':'')+'" onclick="cycleTask(\''+t.id+'\',false)" ondblclick="openEditTask(\''+t.id+'\',false)">'
      +'<div class="dcard-chk">'+chk+'</div>'
      +'<div class="dcard-ic">'+t.ic+'</div>'
      +'<div class="dcard-name">'+t.n+'</div>'
      +(t.rwd?'<div class="dcard-rwd">'+t.rwd+'</div>':'')
      +strk+'</div>';
  }).join('');

  var forbid=S.forbid||[];
  document.getElementById('forbid-grid').innerHTML=forbid.map(function(t){
    var days=t.lastCheck?Math.abs(daysSince(t.lastCheck)):0;
    return '<div class="fcard '+(t.st==='f'?'violated':'')+'" onclick="cycleTask(\''+t.id+'\',true)" ondblclick="openEditTask(\''+t.id+'\',true)">'
      +'<div class="fcard-ic">'+t.ic+'</div>'
      +'<div class="fcard-name">'+t.n+'</div>'
      +'<div class="fcard-days">'+(t.winStreak>0?'已坚守'+t.winStreak+'天✓':'待记录')+'</div></div>';
  }).join('');
}

function saveEditTask(id,isForbid){

function delTask(id,isForbid){

var dlDragId=null,dlIsForbid=false;
function dlDragStart(e,id,isForbid){
  dlDragId=id;dlIsForbid=isForbid;
  setTimeout(function(){var el=document.getElementById((isForbid?'fc-':'dc-')+id);if(el)el.classList.add('dragging');},0);
}
function dlDragOver(e){e.preventDefault();}
function dlDrop(e,targetId,isForbid){
  e.preventDefault();
  if(!dlDragId||dlDragId===targetId||dlIsForbid!==isForbid)return;
  var list=isForbid?(S.forbid||[]):S.daily;
  var fromIdx=list.findIndex(function(x){return x.id===dlDragId;});
  var toIdx=list.findIndex(function(x){return x.id===targetId;});
  if(fromIdx<0||toIdx<0)return;
  var item=list.splice(fromIdx,1)[0];
  list.splice(toIdx,0,item);
  sv();renderDaily();dlDragId=null;
}
function delDailyItem(id,isForbid){
  if(isForbid)S.forbid=(S.forbid||[]).filter(function(x){return x.id!==id;});
  else S.daily=S.daily.filter(function(x){return x.id!==id;});
  sv();renderDaily();
}

function setTaskTab(tab,btn){
  S.taskTab=tab;sv();
  document.querySelectorAll('.task-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderTask();
}

function checkDelayed(){
  var today=tod();
  S.tasks.forEach(function(t){
    if(!t.done&&!t.delayed&&t.period==='today'&&t.date&&t.date<today){
      t.delayed=true;
    }
  });
  sv();
}

function renderTask(){
  checkDelayed();
  var tab=S.taskTab;
  var tasks=S.tasks.filter(function(t){
    if(tab==='delayed')return t.delayed&&!t.done;
    if(tab==='main')return t.type==='main'&&!t.delayed;
    if(tab==='side')return t.type==='side'&&!t.delayed;
    return !t.delayed;
  });
  // Today first, then long-term
  var today=tasks.filter(function(t){return t.period==='today';});
  var longT=tasks.filter(function(t){return t.period==='long';});
  var html='';
  if(today.length){
    today.forEach(function(t){html+=taskCardHTML(t);});
  }
  if(longT.length){
    html+='<div class="sect" style="margin-top:4px"><span>长期任务</span></div>';
    longT.forEach(function(t){html+=taskCardHTML(t);});
  }
  if(!html)html='<div class="mem-empty">暂无任务\n点右上角 + 新增</div>';
  document.getElementById('task-list').innerHTML=html;
}

function taskCardHTML(t){
  var tag='';
  if(t.delayed)tag='<span class="task-tag delayed">⏩ 顺延</span>';
  else if(t.type==='main')tag='<span class="task-tag main">🚩 主线</span>';
  else tag='<span class="task-tag side">💠 支线</span>';
  return '<div class="task-card'+(t.done?' done-card':'')+'">'
    +'<div class="task-chk'+(t.done?' done':'')+'" onclick="togTask(\''+t.id+'\')">'+(t.done?'✓':'')+'</div>'
    +'<div class="task-info"><div class="task-name">'+t.n+'</div>'
    +(t.sub?'<div class="task-sub">'+t.sub+'</div>':'')
    +'<div>'+tag+'</div></div>'
    +'<div class="task-del-btn" onclick="delTaskItem(\''+t.id+'\')">×</div></div>';
}

function togTask(id){
  var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;
  t.done=!t.done;if(t.done)t.delayed=false;
  sv();renderTask();
}
function delTaskItem(id){
  S.tasks=S.tasks.filter(function(x){return x.id!==id;});
  sv();renderTask();
}
function addSubtask(taskId){
  var t=S.tasks.find(function(x){return x.id===taskId;});if(!t)return;
  var n=prompt('添加子任务：');if(!n||!n.trim())return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({id:'s'+Date.now(),n:n.trim(),done:false});
  sv();renderTask();
}
function togSubtask(taskId,subId){
  var t=S.tasks.find(function(x){return x.id===taskId;});if(!t||!t.subtasks)return;
  var s=t.subtasks.find(function(x){return x.id===subId;});if(!s)return;
  s.done=!s.done;
  // Auto-complete parent if all subs done
  if(t.subtasks.length&&t.subtasks.every(function(x){return x.done;}))t.done=true;
  sv();renderTask();
}
function delSubtask(taskId,subId){
  var t=S.tasks.find(function(x){return x.id===taskId;});if(!t||!t.subtasks)return;
  t.subtasks=t.subtasks.filter(function(x){return x.id!==subId;});
  sv();renderTask();
}

      +'<div class="m-btns"><button class="m-btn m-btn-cancel" onclick="closeM()">取消</button>'
      +'<button class="m-btn m-btn-ok" onclick="saveAddMem()">保存</button></div>';
    setTimeout(function(){var el=document.getElementById('mi-text');if(el)el.focus();},100);
  }
  document.getElementById('m-bg').classList.add('open');
}

function closeM(){document.getElementById('m-bg').classList.remove('open');}

function saveAddDaily(){
  var ic=document.getElementById('mi-ic').value.trim()||'🎯';
  var n=document.getElementById('mi-n').value.trim();if(!n)return;
  var rwd=document.getElementById('mi-rwd').value.trim();
  S.daily.push({id:'d'+Date.now(),ic:ic,n:n,rwd:rwd,st:'p',lastCheck:'',winStreak:0,loseStreak:0});
  sv();closeM();renderDaily();
}
function saveAddForbid(){
  var ic=document.getElementById('mi-ic').value.trim()||'🚫';
  var n=document.getElementById('mi-n').value.trim();if(!n)return;
  if(!S.forbid)S.forbid=[];
  S.forbid.push({id:'f'+Date.now(),ic:ic,n:n,st:'p',lastCheck:'',winStreak:0,loseStreak:0});
  sv();closeM();renderDaily();
}
function saveAddTask(){
  var n=document.getElementById('mi-n').value.trim();if(!n)return;
  var sub=document.getElementById('mi-sub').value.trim();
  var type=document.getElementById('mi-type').value;
  var period=document.getElementById('mi-period').value;
  S.tasks.push({id:'t'+Date.now(),n:n,sub:sub,type:type,period:period,done:false,delayed:false,date:tod()});
  sv();closeM();renderTask();
}
function saveAddMem(){
  var text=document.getElementById('mi-text').value.trim();if(!text)return;
  var tagsRaw=document.getElementById('mi-tags').value.trim();
  var tags=tagsRaw?tagsRaw.split(/[,，]/).map(function(s){return s.trim();}).filter(Boolean):[];
  if(!S.mems)S.mems=[];
  S.mems.push({id:'m'+Date.now(),date:tod(),ts:fmtT(new Date()),text:text,tags:tags});
  sv();closeM();renderMem();
}

// ============================================================
// INIT
// ============================================================
renderHeader();
renderAI();
midnightCheck();
checkDelayed();
setInterval(function(){renderHeader();midnightCheck();checkDelayed();},60000);
</script>
